<VirtualHost *:80>
    ServerName uatstore.syncloud.org
    ServerAlias api.uatstore.syncloud.org
    Redirect / https://%{HTTP_HOST}/
</VirtualHost>

<VirtualHost *:443>
    ServerName uatstore.syncloud.org
    DocumentRoot /var/www/store/current/www
    SSLEngine on
    SSLCertificateFile "/etc/letsencrypt/live/uatstore.syncloud.org/fullchain.pem"
    SSLCertificateKeyFile "/etc/letsencrypt/live/uatstore.syncloud.org/privkey.pem"
    ProxyPass /.well-known !
    ProxyPass "/" "unix:/var/www/store/api.socket|http://localhost/"
    CustomLog ${APACHE_LOG_DIR}/store-web-access.log combined
    ErrorLog ${APACHE_LOG_DIR}/store-web-error.log
</VirtualHost>

<VirtualHost *:443>
    ServerName api.uatstore.syncloud.org
    DocumentRoot /var/www/store/current/www
    SSLEngine on
    SSLCertificateFile "/etc/letsencrypt/live/uatstore.syncloud.org/fullchain.pem"
    SSLCertificateKeyFile "/etc/letsencrypt/live/uatstore.syncloud.org/privkey.pem"
    ProxyPass /.well-known !
    ProxyPass "/" "unix:/var/www/store/api.socket|http://localhost/"
    CustomLog ${APACHE_LOG_DIR}/store-api-access.log combined
    ErrorLog ${APACHE_LOG_DIR}/store-api-error.log
</VirtualHost>
