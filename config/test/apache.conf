<VirtualHost *:80>
    ServerName store.test
    DocumentRoot /var/www/store/current/www
    ProxyPass /.well-known !
    ProxyPass "/" "unix:/var/www/store/api.socket|http://localhost/"
    CustomLog ${APACHE_LOG_DIR}/store-web-access.log combined
    ErrorLog ${APACHE_LOG_DIR}/store-web-error.log
</VirtualHost>

<VirtualHost *:80>
    ServerName api.store
    DocumentRoot /var/www/store/current/www
    ProxyPass /.well-known !
    ProxyPass "/" "unix:/var/www/store/api.socket|http://localhost/"
    CustomLog ${APACHE_LOG_DIR}/store-api-access.log combined
    ErrorLog ${APACHE_LOG_DIR}/store-api-error.log
</VirtualHost>
